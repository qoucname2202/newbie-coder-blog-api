name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore newbie-coder-api.sln

      - name: Build
        run: dotnet build newbie-coder-api.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test newbie-coder-api.sln --configuration Release --no-build --verbosity normal
